name: Export Markdown (GitHub Style)

on:
  workflow_dispatch:
  push:
    paths:
      - "**/*.md"

jobs:
  export-md:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: sudo apt-get install -y pandoc

      - name: Export Markdown to GitHub‑styled HTML
        run: |
          mkdir -p exported-html
          find . -name "*.md" | while read file; do
            out="exported-html/${file%.md}.html"
            mkdir -p "$(dirname "$out")"

            pandoc "$file" \
              --from gfm \
              --to html \
              --standalone \
              --embed-resources \
              --css assets/github.css \
              --metadata title="$(basename "$file")" \
              --output "$out"
          done
      - name: Inject Mermaid support
        run: |
          find exported-html -name "*.html" | while read f; do
            printf '%s\n' \
              '<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>' \
              '<script>mermaid.initialize({ startOnLoad: true, theme: "default" });</script>' \
            | sed -i '/<\/body>/r /dev/stdin' "$f"
          done






      - name: Upload HTML artifacts
        uses: actions/upload-artifact@v4
        with:
          name: github-style-html
          path: exported-html
